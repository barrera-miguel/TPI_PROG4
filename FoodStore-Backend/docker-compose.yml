services:
  db:
    image: postgres:16-alpine
    container_name: parcial_db
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: parcial_db
    ports:
      - "5435:5432"  
    volumes:
      - parcial_final_data:/var/lib/postgresql/data 

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: parcial_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  parcial_final_data: 